<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none">
  <!-- Dark background -->
  <rect width="48" height="48" rx="10" fill="#0f172a"/>

  <!-- Chip body -->
  <rect x="11" y="11" width="26" height="26" rx="3" stroke="#e2e8f0" stroke-width="1.75" fill="none"/>

  <!-- Inner grid — 3x3 compute cores -->
  <rect x="16" y="16" width="5" height="5" rx="1" fill="#475569"/>
  <rect x="21.5" y="16" width="5" height="5" rx="1" fill="#475569"/>
  <rect x="27" y="16" width="5" height="5" rx="1" fill="#475569"/>

  <rect x="16" y="21.5" width="5" height="5" rx="1" fill="#475569"/>
  <rect x="21.5" y="21.5" width="5" height="5" rx="1" fill="#00e5ff"/>
  <rect x="27" y="21.5" width="5" height="5" rx="1" fill="#475569"/>

  <rect x="16" y="27" width="5" height="5" rx="1" fill="#475569"/>
  <rect x="21.5" y="27" width="5" height="5" rx="1" fill="#475569"/>
  <rect x="27" y="27" width="5" height="5" rx="1" fill="#475569"/>

  <!-- Pins — top -->
  <line x1="18" y1="11" x2="18" y2="6" stroke="#64748b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="24" y1="11" x2="24" y2="6" stroke="#64748b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="30" y1="11" x2="30" y2="6" stroke="#64748b" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Pins — bottom -->
  <line x1="18" y1="37" x2="18" y2="42" stroke="#64748b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="24" y1="37" x2="24" y2="42" stroke="#64748b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="30" y1="37" x2="30" y2="42" stroke="#64748b" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Pins — left -->
  <line x1="11" y1="18" x2="6" y2="18" stroke="#64748b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="11" y1="24" x2="6" y2="24" stroke="#64748b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="11" y1="30" x2="6" y2="30" stroke="#64748b" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Pins — right -->
  <line x1="37" y1="18" x2="42" y2="18" stroke="#64748b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="37" y1="24" x2="42" y2="24" stroke="#64748b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="37" y1="30" x2="42" y2="30" stroke="#64748b" stroke-width="1.5" stroke-linecap="round"/>
</svg>
