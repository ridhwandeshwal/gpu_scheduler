services:
  redis:
    image: redis:7-alpine
    container_name: gpu_scheduler_redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: gpu_scheduler_minio
    command: server /data --console-address ":9001"
    ports:
      - "9100:9000"   # S3 API — used by the backend
      - "9101:9001"   # Web console — http://localhost:9101
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redisdata:
  miniodata:
