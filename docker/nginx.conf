server {
    listen 80;
    server_name _;

    # Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               application/x-javascript text/xml application/xml text/javascript;

    # Large file uploads (job scripts, requirements)
    client_max_body_size 100M;

    # ── API proxy ───────────────────────────────────────
    # Strips /api prefix and forwards to FastAPI container.
    # e.g. GET /api/jobs  →  GET http://api:8000/jobs
    location /api/ {
        proxy_pass         http://api:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Long timeout for job log streaming
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ── React SPA ───────────────────────────────────────
    location / {
        root  /usr/share/nginx/html;
        index index.html;
        # Client-side routing fallback — all unknown paths serve index.html
        try_files $uri $uri/ /index.html;
    }
}
